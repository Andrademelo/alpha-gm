<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Alunos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/relatorio_alunos.css') }}">
</head>

<body>

    <header class="header">
        <h1>📊 Sistema Escolar</h1>
        <a href="/dashboard" class="btn-voltar">← Voltar</a>
    </header>

    <div class="container">
        
        <!-- Cabeçalho da Página -->
        <div class="page-header">
            <h2>Relatório de Alunos</h2>
        </div>

        <!-- Tabela -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Matrícula</th>
                        <th>Data de Nascimento</th>
                        <th>Turma</th>
                    </tr>
                </thead>
                <tbody>
                    {% for aluno in alunos %}
                    <tr>
                        <td>{{ aluno[1] }}</td>
                        <td>{{ aluno[2] }}</td>
                        <td>{{ aluno[3] }}</td>
                        <td>{{ aluno[4] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Botões -->
        <div class="button-group">
            <button onclick="window.print()" class="btn-imprimir">
                🖨️ Imprimir Relatório
            </button>
            <a href="/dashboard" class="btn-voltar">
                ← Voltar
            </a>
        </div>

    </div>

</body>
</html>
