<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Professor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastrar_professor.css') }}">
</head>

<body>

    <header class="header">
        <h1>Cadastro de Professores</h1>
        <a href="/professores" class="btn-voltar">← Voltar</a>
    </header>

    <div class="container">
        
        <div class="form-card">
            
            <div class="card-header">
                <h2>Cadastrar Professor</h2>
                <p>Preencha os dados abaixo para cadastrar um novo professor.</p>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" 
                               id="nome"
                               name="nome" 
                               class="form-control" 
                               placeholder="Digite o nome completo" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="disciplina">Disciplina</label>
                        <input type="text" 
                               id="disciplina"
                               name="disciplina" 
                               class="form-control" 
                               placeholder="Digite a disciplina" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" 
                               id="telefone"
                               name="telefone" 
                               class="form-control" 
                               placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" 
                               id="email"
                               name="email" 
                               class="form-control" 
                               placeholder="email@exemplo.com">
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn-submit">
                            💾 Salvar
                        </button>
                        <a href="/professores" class="btn-voltar">
                            ← Voltar
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
