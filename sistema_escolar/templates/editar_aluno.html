<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aluno</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editar_aluno.css') }}">
</head>

<body>

    <header class="header">
        <h1>🎓 Sistema Escolar</h1>
        <a href="/alunos" class="btn-voltar">← Voltar</a>
    </header>

    <div class="container">
        
        <div class="form-card">
            
            <div class="card-header">
                <h2>Editar Aluno</h2>
                <p>Atualize os dados do aluno abaixo.</p>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" 
                               id="nome"
                               name="nome" 
                               value="{{ aluno[1] }}"
                               class="form-control" 
                               placeholder="Digite o nome completo" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="matrícula">Matrícula</label>
                        <input type="text" 
                               id="matricula"
                               name="matricula" 
                               value="{{ aluno[2] }}"
                               class="form-control" 
                               placeholder="Digite a matrícula" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="nascimento">Nascimento</label>
                        <input type="date" 
                               id="nascimento"
                               name="nascimento" 
                               value="{{ aluno[3] }}"
                               class="form-control" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="turma">Turma</label>
                        <input type="text" 
                               id="turma"
                               name="turma" 
                               value="{{ aluno[4] }}"
                               class="form-control" 
                               placeholder="Digite a turma">
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn-submit">
                            💾 Atualizar
                        </button>
                        <a href="/alunos" class="btn-voltar">
                            ← Voltar
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
